name: Generate Changelog

on:
  push:
    branches:
      - main  # Triggers when code is pushed to your default branch

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Gives the action permission to commit files to your repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch all git history for the changelog

      - name: Create Changelog
        id: conventional-changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          git-user-name: "github-actions[bot]"
          git-user-email: "github-actions[bot]@users.noreply.github.com"
          output-file: "CHANGELOG.md"

      - name: Create GitHub Release
        if: ${{ steps.conventional-changelog.outputs.skipped == 'false' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.conventional-changelog.outputs.tag }}
          body: ${{ steps.conventional-changelog.outputs.clean_changelog }}
